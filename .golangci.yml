version: 2

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gocritic
    - gosec
    - bodyclose
    - noctx
    - sqlclosecheck
    - rowserrcheck
    - gocyclo
    - dupl
    - prealloc

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  
  govet:
    enable-all: true
  
  gocyclo:
    min-complexity: 15
  
  dupl:
    threshold: 100
  
  gosec:
    excludes:
      - G202  # SQL string concatenation with validated placeholders
  
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - exitAfterDefer

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - gosec
        - gocritic
    # Отключаем G202 для tickets_repo.go - используем валидированные placeholders
    - path: internal/infra/postgres/tickets_repo\.go
      linters:
        - gosec
      text: "G202"
    - linters:
        - gosec
      text: "G202.*SQL string concatenation"
