version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pet-ticket-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pet_ticket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: pet-ticket-app
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: pet_ticket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      ENV: local
      POSTGRES_ENABLED_MIGRATION: false
      LOGGER_FORMAT: console
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started

  auto-closer:
    build:
      context: .
      dockerfile: Dockerfile.auto-closer
    container_name: pet-ticket-auto-closer
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: pet_ticket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      AUTO_CLOSE_ENABLED: "true"
      AUTO_CLOSE_AFTER_DAYS: "7"
      AUTO_CLOSE_CRON: "0 * * * *"
      AUTO_CLOSE_BATCH_SIZE: "100"
      AUTO_CLOSE_PROCESSING_TIMEOUT: "300"
      LOGGER_FORMAT: console
      ENV: local
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  mock-server:
    image: kennethreitz/httpbin
    container_name: pet-ticket-mock-server
    ports:
      - "9999:80"

  notification-worker:
    build:
      context: .
      dockerfile: Dockerfile.notification-worker
    container_name: pet-ticket-notification-worker
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: pet_ticket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      NOTIFICATION_WEBHOOK_URL: "http://mock-server/post"
      NOTIFICATION_HTTP_TIMEOUT: "10"
      NOTIFICATION_POLL_INTERVAL: "5"
      NOTIFICATION_BATCH_SIZE: "20"
      NOTIFICATION_BASE_BACKOFF_SECONDS: "30"
      NOTIFICATION_CB_FAILURE_THRESHOLD: "5"
      NOTIFICATION_CB_SUCCESS_THRESHOLD: "2"
      NOTIFICATION_CB_TIMEOUT: "30"
      LOGGER_FORMAT: console
      ENV: local
    depends_on:
      postgres:
        condition: service_healthy
      mock-server:
        condition: service_started
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: pet-ticket-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  grafana:
    image: grafana/grafana:10.2.3
    container_name: pet-ticket-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: pet-ticket-jaeger
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317"   # OTLP gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
