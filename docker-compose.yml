version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pet-ticket-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pet_ticket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: pet-ticket-app
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: pet_ticket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      ENV: local
      POSTGRES_ENABLED_MIGRATION: false
      LOGGER_FORMAT: console
    depends_on:
      postgres:
        condition: service_healthy

  auto-closer:
    build:
      context: .
      dockerfile: Dockerfile.auto-closer
    container_name: pet-ticket-auto-closer
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: pet_ticket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      AUTO_CLOSE_ENABLED: "true"
      AUTO_CLOSE_AFTER_DAYS: "7"
      AUTO_CLOSE_CRON: "0 * * * *"
      AUTO_CLOSE_BATCH_SIZE: "100"
      AUTO_CLOSE_PROCESSING_TIMEOUT: "300"
      LOGGER_FORMAT: console
      ENV: local
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pet-ticket-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics-service:
    build:
      context: .
      dockerfile: analytics-service/Dockerfile
    container_name: pet-ticket-analytics-service
    ports:
      - "8081:8081"
    environment:
      GRPC_TARGET: app:9001
      REDIS_ADDR: redis:6379
      LOGGER_FORMAT: console
      ENV: local
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: pet-ticket-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  grafana:
    image: grafana/grafana:10.2.3
    container_name: pet-ticket-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
