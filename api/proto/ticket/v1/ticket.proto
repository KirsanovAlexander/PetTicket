syntax = "proto3";

package ticket.v1;

option go_package = "pet-ticket/api/gen/go/ticket/v1;ticketv1";

import "google/protobuf/timestamp.proto";

// TicketService — сервис управления тикетами
service TicketService {
  rpc CreateTicket(CreateTicketRequest) returns (CreateTicketResponse);
  rpc GetTicket(GetTicketRequest) returns (GetTicketResponse);
  rpc UpdateTicket(UpdateTicketRequest) returns (UpdateTicketResponse);
  rpc DeleteTicket(DeleteTicketRequest) returns (DeleteTicketResponse);
  rpc ListTickets(ListTicketsRequest) returns (ListTicketsResponse);
  rpc GetTicketHistory(GetTicketHistoryRequest) returns (GetTicketHistoryResponse);
  rpc GetAllStatuses(GetAllStatusesRequest) returns (GetAllStatusesResponse);
  rpc GetAllTopics(GetAllTopicsRequest) returns (GetAllTopicsResponse);
}

// Ticket — тикет
message Ticket {
  int64 id = 1;
  int64 user_id = 2;
  int64 topic_id = 3;
  int32 status_id = 4;
  string status_name = 5;
  optional double amount = 6;
  string comment = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

// CreateTicketRequest — запрос на создание тикета
message CreateTicketRequest {
  int64 user_id = 1;
  int64 topic_id = 2;
  optional double amount = 3;
  string comment = 4;
}

// CreateTicketResponse — ответ с созданным тикетом
message CreateTicketResponse {
  Ticket ticket = 1;
}

// GetTicketRequest — запрос тикета по ID
message GetTicketRequest {
  int64 id = 1;
}

// GetTicketResponse — ответ с тикетом
message GetTicketResponse {
  Ticket ticket = 1;
}

// UpdateTicketRequest — запрос на обновление тикета
message UpdateTicketRequest {
  int64 id = 1;
  optional int32 status_id = 2;
  optional string comment = 3;
}

// UpdateTicketResponse — ответ с обновлённым тикетом
message UpdateTicketResponse {
  Ticket ticket = 1;
}

// DeleteTicketRequest — запрос на удаление тикета
message DeleteTicketRequest {
  int64 id = 1;
}

// DeleteTicketResponse — пустой ответ
message DeleteTicketResponse {}

// ListTicketsRequest — запрос списка тикетов
message ListTicketsRequest {
  optional int64 user_id = 1;
  optional int64 topic_id = 2;
  optional int32 status_id = 3;
  int32 limit = 4;
  int32 offset = 5;
  string sort_by = 6;
  bool sort_desc = 7;
}

// ListTicketsResponse — ответ со списком тикетов
message ListTicketsResponse {
  repeated Ticket tickets = 1;
  int64 total = 2;
}

// HistoryRecord — запись истории тикета
message HistoryRecord {
  int64 id = 1;
  int64 ticket_id = 2;
  int64 user_id = 3;
  string action = 4;
  string old_value = 5;
  string new_value = 6;
  google.protobuf.Timestamp created_at = 7;
}

// GetTicketHistoryRequest — запрос истории тикета
message GetTicketHistoryRequest {
  int64 ticket_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

// GetTicketHistoryResponse — ответ с историей
message GetTicketHistoryResponse {
  repeated HistoryRecord records = 1;
}

// Status — статус тикета (справочник)
message Status {
  int32 id = 1;
  string name = 2;
}

// GetAllStatusesRequest — запрос списка статусов
message GetAllStatusesRequest {}

// GetAllStatusesResponse — ответ со списком статусов
message GetAllStatusesResponse {
  repeated Status statuses = 1;
}

// Topic — тема тикета (справочник)
message Topic {
  int64 id = 1;
  int64 external_id = 2;
  string title = 3;
  string description = 4;
}

// GetAllTopicsRequest — запрос списка тем
message GetAllTopicsRequest {}

// GetAllTopicsResponse — ответ со списком тем
message GetAllTopicsResponse {
  repeated Topic topics = 1;
}
